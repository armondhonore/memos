application:
  name: memos
  pods:
    - name: app
      image: "."
      path: /
      servicePorts:
        - 5230
      vars:
        MEMOS_PORT: "5230"
        MEMOS_DATA: "/var/opt/memos"
        MEMOS_ADDR: "0.0.0.0"
      volumes:
        - name: data
          mountPath: /var/opt/memos
          size: 5Gi
