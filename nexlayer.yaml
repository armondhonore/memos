application:
  name: memos
  pods:
  - name: app
    image: "neosmemo/memos:stable"
    path: /
    servicePorts:
    - 5230
    vars:
      MEMOS_PORT: "5230"
      MEMOS_ADDR: "0.0.0.0"
      MEMOS_DATA: "/var/opt/memos"
    volumes:
    - name: memos-data
      mountPath: /var/opt/memos
      size: 5Gi
